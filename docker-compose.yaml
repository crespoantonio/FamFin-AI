services:
  db:
    image: postgres:16-alpine
    container_name: famfin-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-famfin_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-famfin_password}
      POSTGRES_DB: ${POSTGRES_DB:-famfin_db}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-famfin_user} -d ${POSTGRES_DB:-famfin_db}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Containerfile
    container_name: famfin-app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-famfin_user}:${POSTGRES_PASSWORD:-famfin_password}@db:5432/${POSTGRES_DB:-famfin_db}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      MESSAGING_WEBHOOK_SECRET: ${MESSAGING_WEBHOOK_SECRET}
      WHISPER_MODEL_SIZE: ${WHISPER_MODEL_SIZE}
      WHISPER_DEVICE: ${WHISPER_DEVICE}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      N8N_CALLBACK_URL: ${N8N_CALLBACK_URL}
    volumes:
      - .:/app
      - whisper_model_cache:/root/.cache/huggingface
    depends_on:
      db:
        condition: service_healthy

  n8n:
    image: n8nio/n8n
    container_name: famfin-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - app

  ollama:
    image: ollama/ollama:latest
    container_name: famfin-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  n8n_data:
  ollama_data:
  whisper_model_cache:
